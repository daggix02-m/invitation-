


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graduation Invitation – Dagmawi Tefera</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #080808;
      --deep:       #111111;
      --gold:       #C9A84C;
      --gold-light: #E8C96A;
      --gold-bright:#FFD966;
      --white:      #F7F2E8;
      --white-dim:  #D4C9B0;
    }

    body {
      background: #050505;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Ambient gold glow behind card */
    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    /* Outer gold border frame */
    .card {
      position: relative;
      background: var(--deep);
      padding: 3px;
      border-radius: 2px;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold), #8B6914, var(--gold), var(--gold-bright));
      border-radius: 2px;
      z-index: -1;
    }

    .card-inner {
      background: var(--black);
      padding: 52px 48px 48px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle noise texture overlay */
    .card-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 150px 150px;
      opacity: 0.35;
      pointer-events: none;
    }

    /* Inner double-rule border */
    .inner-border {
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(201,168,76,0.25);
      pointer-events: none;
    }
    .inner-border::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201,168,76,0.10);
    }

    /* Corner ornaments */
    .corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.7;
    }
    .corner.tl { top: 22px; left: 22px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 22px; right: 22px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 22px; left: 22px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 22px; right: 22px; border-width: 0 1px 1px 0; }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Laurel SVG crest */
    .crest {
      margin-bottom: 20px;
      animation: fadeUp 1.2s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .crest svg {
      width: 80px;
      opacity: 0.9;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 18px;
      animation: fadeUp 1.2s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 80%;
      margin-bottom: 20px;
      animation: fadeUp 1.2s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .divider-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .invite-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 15px;
      color: var(--white-dim);
      letter-spacing: 0.04em;
      margin-bottom: 22px;
      animation: fadeUp 1.2s 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    .honoree {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.06em;
      line-height: 1.2;
      text-transform: uppercase;
      margin-bottom: 6px;
      animation: fadeUp 1.2s 0.5s cubic-bezier(0.22,1,0.36,1) both;
      text-shadow: 0 0 40px rgba(201,168,76,0.2);
    }

    .honoree-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 28px;
      animation: fadeUp 1.2s 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    .event-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--gold-light);
      text-transform: uppercase;
      margin-bottom: 30px;
      animation: fadeUp 1.2s 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    .details-block {
      width: 85%;
      border-top: 1px solid rgba(201,168,76,0.2);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 22px 0;
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      animation: fadeUp 1.2s 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
    }
    .detail-item + .detail-item {
      border-left: 1px solid rgba(201,168,76,0.15);
    }

    .detail-icon {
      font-size: 16px;
      line-height: 1;
      color: var(--gold);
      margin-bottom: 2px;
    }

    .detail-label {
      font-family: 'Cinzel', serif;
      font-size: 7px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.7;
    }

    .detail-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--white);
      text-align: center;
      line-height: 1.4;
    }

    .venue-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--white-dim);
      margin-bottom: 30px;
      animation: fadeUp 1.2s 0.75s cubic-bezier(0.22,1,0.36,1) both;
      letter-spacing: 0.05em;
    }

    /* Seal */
    .seal {
      position: relative;
      width: 72px; height: 72px;
      animation: fadeUp 1.2s 0.85s cubic-bezier(0.22,1,0.36,1) both;
    }
    .seal svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 10px rgba(201,168,76,0.35));
    }
    .seal-year {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.08em;
    }

    /* Gold shimmer sweep animation on card border */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      background-size: 200% auto;
      animation: shimmer 4s linear infinite;
    }

    .venue-link {
      text-decoration: none;
      transition: color 0.2s, opacity 0.2s;
    }
    .venue-link:hover {
      color: var(--gold-bright);
      opacity: 0.85;
    }

    /* Print styles */
    @media print {
      body { background: white; padding: 0; }
      body::before { display: none; }
      .card { box-shadow: none; }
    }

    @media (max-width: 480px) {
      .card-inner { padding: 40px 28px 36px; }
      .honoree { font-size: 22px; }
      .details-block { width: 95%; }
      .detail-value { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="card">
      <div class="card-inner">

        <div class="inner-border"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="content">

          <!-- Laurel Crest -->
          <div class="crest">
            <svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Left laurel branch -->
              <g stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round">
                <path d="M50 70 Q38 60 30 48"/>
                <path d="M50 70 Q36 55 26 45"/>
                <ellipse cx="26" cy="42" rx="7" ry="4" transform="rotate(-35 26 42)" fill="#C9A84C" opacity="0.5"/>
                <ellipse cx="30" cy="34" rx="7" ry="4" transform="rotate(-50 30 34)" fill="#C9A84C" opacity="0.5"/>
                <ellipse cx="36" cy="27" rx="6" ry="3.5" transform="rotate(-60 36 27)" fill="#C9A84C" opacity="0.5"/>
                <ellipse cx="43" cy="22" rx="6" ry="3" transform="rotate(-70 43 22)" fill="#C9A84C" opacity="0.5"/>
                <path d="M50 70 Q35 52 22 42 Q28 38 32 44"/>
                <path d="M50 70 Q33 48 20 36"/>
                <ellipse cx="20" cy="33" rx="7" ry="4" transform="rotate(-25 20 33)" fill="#C9A84C" opacity="0.4"/>
              </g>
              <!-- Right laurel branch (mirror) -->
              <g stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round">
                <path d="M50 70 Q62 60 70 48"/>
                <path d="M50 70 Q64 55 74 45"/>
                <ellipse cx="74" cy="42" rx="7" ry="4" transform="rotate(35 74 42)" fill="#C9A84C" opacity="0.5"/>
                <ellipse cx="70" cy="34" rx="7" ry="4" transform="rotate(50 70 34)" fill="#C9A84C" opacity="0.5"/>
                <ellipse cx="64" cy="27" rx="6" ry="3.5" transform="rotate(60 64 27)" fill="#C9A84C" opacity="0.5"/>
                <ellipse cx="57" cy="22" rx="6" ry="3" transform="rotate(70 57 22)" fill="#C9A84C" opacity="0.5"/>
                <path d="M50 70 Q65 52 78 42 Q72 38 68 44"/>
                <path d="M50 70 Q67 48 80 36"/>
                <ellipse cx="80" cy="33" rx="7" ry="4" transform="rotate(25 80 33)" fill="#C9A84C" opacity="0.4"/>
              </g>
              <!-- Cap mortarboard -->
              <rect x="35" y="13" width="30" height="4" rx="1" fill="#C9A84C"/>
              <polygon points="50,6 67,13 50,20 33,13" fill="#C9A84C" opacity="0.85"/>
              <circle cx="50" cy="6" r="2" fill="#C9A84C"/>
              <!-- tassel -->
              <line x1="50" y1="8" x2="58" y2="14" stroke="#C9A84C" stroke-width="1"/>
              <line x1="58" y1="14" x2="58" y2="20" stroke="#C9A84C" stroke-width="1.2"/>
            </svg>
          </div>

          <div class="eyebrow">Unity University · Gerji Campus</div>

          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
          </div>

          <div class="invite-text">With great honour, you are cordially invited to celebrate</div>

          <div class="honoree">Dagmawi<br>Tefera</div>
          <div class="honoree-sub">upon his graduation</div>

          <div class="event-title">Graduation Ceremony · MMXXVI</div>

          <div class="details-block">
            <div class="detail-item">
              <div class="detail-icon">◈</div>
              <div class="detail-label">Date</div>
              <div class="detail-value">April 26<br>2026</div>
            </div>
            <div class="detail-item">
              <div class="detail-icon">◈</div>
              <div class="detail-label">Time</div>
              <div class="detail-value">12:00 Noon<br><span style="font-style:italic;font-size:11px;color:var(--white-dim)">Luncheon to follow</span></div>
            </div>
            <div class="detail-item">
              <div class="detail-icon">◈</div>
              <div class="detail-label">Venue</div>
              <div class="detail-value">Lafto Belay<br>Condominium</div>
            </div>
          </div>

          <a href="https://maps.app.goo.gl/bH3Kh7YvNnj6mc6Y9" target="_blank" class="venue-name venue-link">
            📍 Lafto Belay Condominium · Addis Ababa, Ethiopia
          </a>

          <div class="divider" style="margin-bottom: 24px;">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
          </div>

          <!-- Seal -->
          <div class="seal">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
              <circle cx="40" cy="40" r="36" fill="none" stroke="#C9A84C" stroke-width="1"/>
              <circle cx="40" cy="40" r="30" fill="none" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="3 3"/>
              <circle cx="40" cy="40" r="24" fill="rgba(201,168,76,0.06)" stroke="#C9A84C" stroke-width="0.8"/>
              <!-- Star points around rim -->
              <g fill="#C9A84C" opacity="0.6">
                <polygon points="40,4 41.5,8.5 40,7.5 38.5,8.5" />
                <polygon points="76,40 71.5,41.5 72.5,40 71.5,38.5" />
                <polygon points="40,76 38.5,71.5 40,72.5 41.5,71.5" />
                <polygon points="4,40 8.5,38.5 7.5,40 8.5,41.5" />
                <polygon points="65,15 61,19 62,17 60,16" />
                <polygon points="65,65 60,64 62,63 61,61" />
                <polygon points="15,65 19,61 17,62 16,60" />
                <polygon points="15,15 16,20 17,18 19,19" />
              </g>
            </svg>
            <div class="seal-year">2026</div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
